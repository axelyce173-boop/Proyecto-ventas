<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Ventas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card { padding: 1rem; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    .card h2 { margin-top: 0; }
    .metric { font-size: 2rem; font-weight: 700; margin: 0.25rem 0; }
  </style>
</head>
<body>
  <h1>Dashboard de Ventas</h1>
  <p>Este dashboard consume la API en <code>http://localhost:8000</code>. Asegúrese de ejecutar <code>uvicorn api.main:app --reload</code> antes de abrir este archivo.</p>
  <div class="grid">
    <div class="card">
      <h2>Tendencia histórica de ventas</h2>
      <canvas id="salesChart" height="250"></canvas>
    </div>
    <div class="card">
      <h2>Top 5 clientes</h2>
      <canvas id="topCustomersChart" height="250"></canvas>
    </div>
    <div class="card">
      <h2>Monto pendiente de cobro</h2>
      <div class="metric" id="pendingAmount">Cargando...</div>
      <div class="metric" id="debtorsCount"></div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    async function obtenerJson(ruta) {
      const res = await fetch(`${API}${ruta}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function formatearMoneda(valor) {
      return new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" }).format(valor);
    }

    async function renderizar() {
      const ventas = await fetchJson("/metricas/ventas_por_mes");
      const etiquetas = ventas.map(r => `${r.year}-${String(r.month).padStart(2, "0")}`);
      const totales = ventas.map(r => r.total);

      const ctxVentas = document.getElementById("salesChart").getContext("2d");
      new Chart(ctxVentas, {
        type: "line",
        data: {
          labels: etiquetas,
          datasets: [{ label: "Ventas totales", data: totales, borderColor: "#007acc", backgroundColor: "rgba(0,122,204,0.15)", fill: true }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      const topClientes = await fetchJson("/metricas/top_clientes");
      const ctxTop = document.getElementById("topCustomersChart").getContext("2d");
      new Chart(ctxTop, {
        type: "bar",
        data: {
          labels: topClientes.map(r => r.customer_name),
          datasets: [{ label: "Facturación", data: topClientes.map(r => r.total), backgroundColor: "#1f77b4" }]
        },
        options: { responsive: true }
      });

      const pendiente = await fetchJson("/metricas/pendiente");
      document.getElementById("pendingAmount").innerText = formatCurrency(pendiente.pending_total || 0);
      document.getElementById("debtorsCount").innerText = `Deudores: ${pendiente.debtors || 0}`;
    }

    renderizar().catch(err => {
      console.error(err);
      document.body.insertAdjacentHTML("beforeend", `<p style='color:red;'>Error cargando datos: ${err.message}</p>`);
    });
  </script>
</body>
</html>
